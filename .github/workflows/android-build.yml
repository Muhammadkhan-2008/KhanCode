name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Android environment
      run: |
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
        echo "CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL=https\://services.gradle.org/distributions/gradle-8.7-bin.zip" >> $GITHUB_ENV

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Cordova and dependencies
      run: |
        npm install -g cordova parcel
        npm install

    - name: Build JS
      run: npm run build

    - name: Add Android Platform
      run: cordova platform add android@13.0.0

    - name: Force Gradle Wrapper to 8.7
      run: |
        cd platforms/android
        # Rewrite the wrapper properties directly to ensure 8.7 is used
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Build Android APK
      run: cordova build android --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AeroCode-Release-APK
        path: platforms/android/app/build/outputs/apk/release/*.apk
