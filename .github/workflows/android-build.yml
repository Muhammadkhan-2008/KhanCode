name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Clean conflicting gradle daemon states
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/daemon/

    - name: Install Cordova and dependencies
      run: |
        npm install -g cordova@12 parcel
        npm install

    - name: Build JS
      run: npm run build

    - name: Add Android Platform
      run: cordova platform add android@13.0.0

    - name: Update wrapper config explicitly
      run: |
        cd platforms/android
        # Bypass class 65 error from gradle 7 fallback
        sed -i 's/gradle-[a-zA-Z0-9.-]*-all.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties

    - name: Build Android APK
      run: cordova build android --release -- --jvmargs="-Xmx2048m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AeroCode-Release-APK
        path: platforms/android/app/build/outputs/apk/release/*.apk
