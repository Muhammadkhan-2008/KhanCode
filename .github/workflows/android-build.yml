name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java 11 for maximum Cordova/Gradle stability on github runners
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Cordova and dependencies
      run: |
        npm install -g cordova@11 parcel
        npm install

    - name: Build JS
      run: npm run build

    - name: Add Android Platform
      run: cordova platform add android@10.1.2

    - name: Build Android APK
      run: cordova build android --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AeroCode-Release-APK
        path: platforms/android/app/build/outputs/apk/release/*.apk
