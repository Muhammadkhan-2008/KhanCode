name: Android Capacitor APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java 17 safely
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Clean runner env explicitly
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf ~/.gradle/daemon/
        rm -rf ~/.gradle/wrapper/

    - name: Install dependencies & Build Web
      run: |
        npm install -g @capacitor/cli parcel
        npm install --legacy-peer-deps
        npm run build -- --no-cache

    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AeroCode-Release-APK
        path: android/app/build/outputs/apk/release/*.apk
