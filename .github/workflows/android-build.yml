name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Cordova and dependencies
      run: |
        npm install -g cordova parcel
        npm install

    - name: Build JS
      run: npm run build

    - name: Add Android Platform
      run: cordova platform add android@13.0.0

    - name: Fix Wrapper properties inline explicitly using right directory
      run: |
        mkdir -p platforms/android/gradle/wrapper
        cat << 'WRAPPER_EOF' > platforms/android/gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAPPER_EOF

    - name: Run Build
      run: |
        export JAVA_HOME=$JAVA_HOME_17_X64
        cd platforms/android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AeroCode-Release-APK
        path: platforms/android/app/build/outputs/apk/release/*.apk
