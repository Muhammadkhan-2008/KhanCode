<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link rel="stylesheet" href="css/index.css">
    <title>AeroCode</title>
</head>
<body>
    <div id="app">
        <header id="top-bar">
            <div class="logo">
                <img src="img/logo.svg" alt="AeroCode Logo" width="30" height="30">
                <span>AeroCode</span>
            </div>
            <div class="controls">
                <button id="run-btn" class="btn primary">Run</button>
            </div>
        </header>
        <div id="editor-container"></div>
        <div id="terminal-container"></div>
        <div id="browser-preview" style="display:none;">
            <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>
    <script src="cordova.js"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
